<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos Familiares</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0f0e17;
  --surface:#1a1928;
  --card:#211f35;
  --accent:#e8c547;
  --text:#fffffe;
  --muted:#a7a9be;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  padding:1.5rem 1rem 3rem;
  background-image:
    radial-gradient(ellipse at 20% 0%,#2a1f5e44 0%,transparent 55%),
    radial-gradient(ellipse at 80% 100%,#5e1f3e33 0%,transparent 55%);
  overflow-x:hidden;
}

/* ── HEADER ── */
.header{
  text-align:center;
  margin-bottom:2rem;
  position:relative;
}

.mama-wrap{
  display:inline-block;
  cursor:pointer;
  position:relative;
  user-select:none;
}

.mama-img{
  width:110px;
  mix-blend-mode:screen;
  filter:brightness(1.05);
  transition:transform .2s;
  display:block;
  margin:0 auto;
}
.mama-wrap:hover .mama-img{transform:scale(1.07);}

h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,5vw,2.8rem);
  font-weight:900;
  letter-spacing:-1px;
  line-height:1.1;
  margin-top:.4rem;
}
h1 span{color:var(--accent);}
.subtitle{color:var(--muted);font-size:.85rem;margin-top:.4rem;font-weight:300;}

/* ── SUMMARY ── */
.summary-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:.8rem;
  max-width:680px;
  margin:0 auto 2rem;
}
.summary-card{
  background:var(--card);
  border:1px solid #ffffff10;
  border-radius:14px;
  padding:1rem 1.1rem;
  text-align:center;
}
.summary-card .label{color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:500;}
.summary-card .value{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;margin-top:.25rem;color:var(--accent);}

/* ── OVERALL BAR ── */
.overall-section{
  max-width:680px;
  margin:0 auto 2rem;
  background:var(--card);
  border:1px solid #ffffff10;
  border-radius:18px;
  padding:1.4rem 1.6rem;
}
.overall-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.9rem;}
.overall-header h2{font-family:'Playfair Display',serif;font-size:1.15rem;}
.overall-pct{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--accent);}
.bar-track{background:#ffffff12;border-radius:999px;height:22px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#e8c547,#f0a500);transition:width .9s cubic-bezier(.4,0,.2,1);}
.deadline-note{margin-top:.7rem;color:var(--muted);font-size:.78rem;display:flex;justify-content:space-between;}

/* ── PERSON CARDS ── */
.persons-section{max-width:680px;margin:0 auto 2rem;display:flex;flex-direction:column;gap:1rem;}

.person-card{
  background:var(--card);
  border:1px solid #ffffff0d;
  border-radius:16px;
  padding:1rem 1.2rem 1rem 0.8rem;
  transition:border-color .2s, transform .15s;
  cursor:pointer;
  position:relative;
  overflow:visible;
}
.person-card:hover{border-color:#e8c54740;transform:translateY(-2px);}

.person-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.7rem;}

/* character image */
.char-running{
  width:60px;
  height:70px;
  object-fit:contain;
  mix-blend-mode:screen;
  filter:brightness(1.1);
  flex-shrink:0;
  animation:run 1.2s ease-in-out infinite alternate;
  transform-origin:bottom center;
  cursor:pointer;
}
@keyframes run{
  0%{transform:translateY(0) rotate(-3deg);}
  100%{transform:translateY(-6px) rotate(3deg);}
}

.person-info{flex:1;}
.person-name{
  font-weight:700;
  font-size:1.05rem;
  cursor:pointer;
  display:inline-block;
  transition:color .2s;
}
.person-name:hover{color:var(--accent);}
.person-amounts{font-size:.73rem;color:var(--muted);margin-top:.15rem;}
.person-pct{font-family:'Playfair Display',serif;font-weight:700;font-size:1.2rem;}

.mini-bar-track{background:#ffffff10;border-radius:999px;height:8px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:999px;transition:width .9s cubic-bezier(.4,0,.2,1);}

.status-badge{
  display:inline-block;font-size:.6rem;padding:2px 7px;border-radius:999px;
  font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-left:5px;vertical-align:middle;
}
.badge-done{background:#4caf5033;color:#81c784;}
.badge-pending{background:#ff6b6b22;color:#ff8a80;}

/* ── COMIC BUBBLE ── */
.bubble-overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:1000;
  background:#000000aa;
  align-items:center;
  justify-content:center;
  padding:1rem;
}
.bubble-overlay.active{display:flex;}

.bubble-inner{
  position:relative;
  max-width:420px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}

.bubble-char{
  width:160px;
  mix-blend-mode:normal;
  filter:drop-shadow(0 8px 24px #000a);
  margin-bottom:-10px;
  position:relative;
  z-index:2;
}

.bubble-box{
  background:#fffde7;
  border:4px solid #333;
  border-radius:22px;
  padding:1.2rem 1.5rem 1rem;
  position:relative;
  width:100%;
  box-shadow:6px 6px 0 #333;
  z-index:1;
}
/* tail pointing up toward character */
.bubble-box::before{
  content:'';
  position:absolute;
  top:-22px;
  left:50%;
  transform:translateX(-50%);
  border:12px solid transparent;
  border-bottom-color:#333;
}
.bubble-box::after{
  content:'';
  position:absolute;
  top:-15px;
  left:50%;
  transform:translateX(-50%);
  border:10px solid transparent;
  border-bottom-color:#fffde7;
}

.bubble-name{
  font-family:'Bangers',cursive;
  font-size:1.5rem;
  letter-spacing:1px;
  color:#333;
  margin-bottom:.4rem;
}
.bubble-text{
  font-family:'DM Sans',sans-serif;
  font-size:1rem;
  color:#222;
  line-height:1.45;
  min-height:2.5rem;
}
.bubble-close{
  margin-top:1rem;
  background:var(--accent);
  color:#111;
  border:none;border-radius:999px;
  padding:.5rem 1.4rem;
  font-weight:700;font-size:.9rem;
  cursor:pointer;
  transition:opacity .15s;
}
.bubble-close:hover{opacity:.85;}

/* ── MAMA BUBBLE (fixed center) ── */
.mama-bubble-overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:1000;
  background:#000000aa;
  align-items:center;
  justify-content:center;
  padding:1rem;
}
.mama-bubble-overlay.active{display:flex;}

.mama-bubble-inner{
  position:relative;
  max-width:400px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
.mama-bubble-char{
  width:150px;
  mix-blend-mode:normal;
  filter:drop-shadow(0 8px 24px #000a);
  margin-bottom:-10px;
  position:relative;z-index:2;
}

/* ── INPUT FORM ── */
.input-section{
  max-width:680px;margin:0 auto;
  background:var(--card);border:1px solid #ffffff10;border-radius:18px;padding:1.4rem 1.6rem;
}
.input-section h3{font-family:'Playfair Display',serif;font-size:1.05rem;margin-bottom:1rem;}
.form-row{display:flex;gap:.7rem;flex-wrap:wrap;align-items:flex-end;}
.form-group{display:flex;flex-direction:column;gap:.35rem;flex:1;min-width:120px;}
.form-group label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:500;}
select,input[type=number]{
  background:#ffffff08;border:1px solid #ffffff18;color:var(--text);
  border-radius:10px;padding:.65rem .85rem;
  font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;width:100%;
}
select:focus,input[type=number]:focus{border-color:var(--accent);}
select option{background:#211f35;}
button.add-btn{
  background:var(--accent);color:#0f0e17;border:none;border-radius:10px;
  padding:.7rem 1.4rem;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.95rem;
  cursor:pointer;transition:opacity .2s,transform .1s;white-space:nowrap;
}
button.add-btn:hover{opacity:.9;}
button.add-btn:active{transform:scale(.97);}

.history{margin-top:1.1rem;max-height:170px;overflow-y:auto;}
.history-item{
  display:flex;justify-content:space-between;padding:.4rem 0;
  border-bottom:1px solid #ffffff08;font-size:.8rem;color:var(--muted);
  animation:fadeIn .3s ease;
}
.history-item span:last-child{color:var(--accent);font-weight:500;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;}}

.toast{
  position:fixed;bottom:2rem;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--accent);color:#0f0e17;
  padding:.65rem 1.4rem;border-radius:999px;
  font-weight:600;font-size:.88rem;
  transition:transform .3s ease;z-index:999;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<canvas id="confettiCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>

<!-- ── HEADER ── -->
<div class="header">
  <div class="mama-wrap" onclick="showMamaBubble()">
    <img src="mama_frente.png" class="mama-img" id="mamaImg" alt="Mamá">
  </div>
  <h1>Gastos <span>Familiares</span></h1>
  <p class="subtitle">Total: $130,546 · 5 hermanos · Plazo: 1 Mayo 2027</p>
</div>

<!-- ── SUMMARY ── -->
<div class="summary-grid">
  <div class="summary-card">
    <div class="label">Gasto Total</div>
    <div class="value">$130,546</div>
  </div>
  <div class="summary-card">
    <div class="label">Por Persona</div>
    <div class="value">$26,109</div>
  </div>
  <div class="summary-card">
    <div class="label">Total Pagado</div>
    <div class="value" id="paidDisplay">$0</div>
  </div>
  <div class="summary-card">
    <div class="label">Pendiente</div>
    <div class="value" id="remainDisplay" style="color:#ff8a80">$130,546</div>
  </div>
</div>

<!-- ── OVERALL ── -->
<div class="overall-section">
  <div class="overall-header">
    <h2>Progreso General</h2>
    <div class="overall-pct" id="overallPct">0%</div>
  </div>
  <div class="bar-track">
    <div class="bar-fill" id="overallBar" style="width:0%"></div>
  </div>
  <div class="deadline-note">
    <span id="daysLeft">Calculando...</span>
    <span>Meta: 1 Mayo 2027</span>
  </div>
</div>

<!-- ── PERSONS ── -->
<div class="persons-section" id="personsSection"></div>

<!-- ── INPUT ── -->
<div class="input-section">
  <h3>Registrar Pago</h3>
  <div class="form-row">
    <div class="form-group">
      <label>Hermano/a</label>
      <select id="personSelect">
        <option value="Negro">Negro</option>
        <option value="José">José</option>
        <option value="Rosario">Rosario</option>
        <option value="Marta">Marta</option>
        <option value="Juan">Juan</option>
      </select>
    </div>
    <div class="form-group">
      <label>Monto ($)</label>
      <input type="number" id="amountInput" placeholder="Ej: 5000" min="0">
    </div>
    <button class="add-btn" onclick="registerPayment()">Agregar</button>
  </div>
  <div class="history" id="history"></div>
</div>

<!-- ── COMIC BUBBLE (siblings) ── -->
<div class="bubble-overlay" id="bubbleOverlay" onclick="closeBubble(event)">
  <div class="bubble-inner" id="bubbleInner">
    <img src="" class="bubble-char" id="bubbleChar" alt="">
    <div class="bubble-box">
      <div class="bubble-name" id="bubbleName"></div>
      <div class="bubble-text" id="bubbleText"></div>
      <button class="bubble-close" onclick="closeBubbleBtn()">Cerrar</button>
    </div>
  </div>
</div>

<!-- ── MAMA BUBBLE ── -->
<div class="mama-bubble-overlay" id="mamaBubbleOverlay" onclick="closeMamaBubble(event)">
  <div class="mama-bubble-inner" id="mamaBubbleInner">
    <img src="mama_frente_v2.png" class="mama-bubble-char" alt="Mamá seria">
    <div class="bubble-box">
      <div class="bubble-name">Mamá dice...</div>
      <div class="bubble-text" id="mamaBubbleText"></div>
      <button class="bubble-close" onclick="closeMamaBubbleBtn()">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOTAL = 130546;
const PER = TOTAL / 5;
const DEADLINE = new Date('2027-05-01');

const COLORS = {
  'Negro':   { bg:'#6c63ff', bar:'linear-gradient(90deg,#6c63ff,#a78bfa)' },
  'José':    { bg:'#f59e0b', bar:'linear-gradient(90deg,#f59e0b,#fbbf24)' },
  'Rosario': { bg:'#ec4899', bar:'linear-gradient(90deg,#ec4899,#f472b6)' },
  'Marta':   { bg:'#10b981', bar:'linear-gradient(90deg,#10b981,#34d399)' },
  'Juan':    { bg:'#3b82f6', bar:'linear-gradient(90deg,#3b82f6,#60a5fa)' },
};

const FILE_KEYS = {
  'Negro':'negro','José':'jose','Rosario':'rosario','Marta':'marta','Juan':'juan'
};

const persons = ['Negro','José','Rosario','Marta','Juan'];
let payments = {};
persons.forEach(p => payments[p] = 0);
payments['Juan'] = 130;
payments['Marta'] = 2100;
payments['Negro'] = 10000;
payments['José'] = 5000;
payments['Rosario'] = 26109;

const paymentHistory = [
  { name:'Rosario', amount:26109, date:'06 jul 2026' },
  { name:'Negro',   amount:10000, date:'05 jun 2026' },
  { name:'José',    amount:5000,  date:'05 jun 2026' },
  { name:'Marta',   amount:2100,  date:'05 jun 2026' },
  { name:'Juan',    amount:130,   date:'05 jun 2026' }
];

function fmt(n){ return '$'+Math.round(n).toLocaleString('es-MX'); }
function pct(paid){ return Math.min(100,(paid/PER)*100); }

// ── PHRASE ENGINE ──
function getSiblingPhrase(name, pctVal){
  if(pctVal === 0) return [
    `¡Todavía no puse nada! 😅 Pero ya voy arrancando...`,
    `Cero pesos por ahora... 😬 ¡Prometo que ya mando algo!`,
    `Mi billetera está en modo avión. ¡Aterrizando pronto! ✈️`
  ][Math.floor(Math.random()*3)];
  if(pctVal < 15) return [
    `¡Arranqué! Puse ${fmt(payments[name])} 💪 Poco a poco llegamos.`,
    `Primer paso dado. El camino largo empieza con un paso chico 🐾`,
    `${fmt(payments[name])} puestos. ¡Esto recién comienza! 🚀`
  ][Math.floor(Math.random()*3)];
  if(pctVal < 35) return [
    `Ya voy por el ${pctVal.toFixed(0)}% 🔥 ¡No paro!`,
    `${fmt(payments[name])} puestos y acelerando 💨`,
    `¡El tren ya está en marcha! ${pctVal.toFixed(0)}% completado 🚂`
  ][Math.floor(Math.random()*3)];
  if(pctVal < 60) return [
    `¡La mitad está cerca! Llevo ${pctVal.toFixed(0)}% 💪`,
    `A mitad de camino y con energía. ¡Vamo' arriba! ⚡`,
    `${fmt(payments[name])} aportados. ¡Voy a terminar esto! 🏃`
  ][Math.floor(Math.random()*3)];
  if(pctVal < 85) return [
    `¡Casi ahí! ${pctVal.toFixed(0)}% y no freno 🎯`,
    `La recta final se ve. ${fmt(payments[name])} puestos 🏁`,
    `¡${pctVal.toFixed(0)}%! ¡Hecho! Unos pesitos más y listo 💸`
  ][Math.floor(Math.random()*3)];
  if(pctVal < 100) return [
    `¡Casi! ${pctVal.toFixed(0)}%... me falta apenas un empujoncito 🙏`,
    `¡El final está a la vuelta! ${fmt(payments[name])} aportados 🔝`,
    `${pctVal.toFixed(0)}% completado. ¡El 100% es mío! 😤`
  ][Math.floor(Math.random()*3)];
  if(name === 'Rosario') return [
    `¡¡PAGUÉ TODO!! 🏆 ¿Y los demás? Los espero sentada... 😏`,
    `100% completado 🎊 ¡Primera en llegar! ¿Alguien me aplaude? 👏`,
    `¡Misión cumplida! 💅 Mientras tanto los otros... bueno. 😂🥇`,
    `¡Todo pagado! Rosario no falla 💪🎉 ¡La mejor hermana del mundo!`
  ][Math.floor(Math.random()*4)];
  return [
    `¡LISTO! 100% cumplido 🎉🎊 ¡Misión completa!`,
    `¡Terminé! Pagué todo. ¿Alguien me debe un asado? 🥩🎉`,
    `100%! ¡Mamá puede estar orgullosa! 🏆✨`
  ][Math.floor(Math.random()*3)];
}

function getMamaPhrase(){
  const totalPaid = persons.reduce((s,p)=>s+payments[p],0);
  const g = (totalPaid/TOTAL)*100;
  const phrases = [
    [`¡Buenas, buenas! Apenas llevan el ${g.toFixed(0)}% 😑 ¿Cuándo me van a dar una alegría?`,
     `Los estoy mirando a todos. ${g.toFixed(0)}% pagado... ¿Eso es todo? 😤`,
     `Vine a ver cómo van. ${g.toFixed(0)}%... mmmm. Hay potencial de mejora. 🤨`],
    [`¡Ya van por el ${g.toFixed(0)}%! Algo es algo... pero podrían más 💪`,
     `${g.toFixed(0)}% ya está. Me alegra ver el esfuerzo. ¡Sigan así! 😊`,
     `¡Arrancaron bien! ${g.toFixed(0)}% completado. Mamá está atenta 👀`],
    [`¡${g.toFixed(0)}%! Ya me voy poniendo contenta 😄 ¡Sigan empujando!`,
     `¡Bien, bien! La mitad casi. ${g.toFixed(0)}% ¡Hay equipo! 🙌`,
     `¡Qué buena pinta tiene esto! ${g.toFixed(0)}% y sumando 🌟`],
    [`¡¡${g.toFixed(0)}%!! ¡Casi llegamos! ¡Me tienen emocionada! 😭❤️`,
     `¡Falta poco! ${g.toFixed(0)}% completado. ¡Los quiero a todos! 🤗`,
     `¡${g.toFixed(0)}%! El final se ve. ¡Mamá los ama! 💜`],
    [`¡¡100%!! ¡¡LO LOGRAMOS!! ¡Los quiero con toda mi alma! 🎊❤️🥹`,
     `¡Cien por ciento! ¡Mis hijos son los mejores del mundo! 🏆👑`,
     `¡¡TERMINARON!! ¡Hoy festejamos! ¡Asado en casa! 🥩🎉🎊`]
  ];
  const idx = g<20?0:g<45?1:g<65?2:g<95?3:4;
  const arr = phrases[idx];
  return arr[Math.floor(Math.random()*arr.length)];
}

// ── TYPEWRITER ──
let typeTimer = null;
function typewrite(el, text, speed=38){
  if(typeTimer) clearInterval(typeTimer);
  el.textContent='';
  let i=0;
  typeTimer = setInterval(()=>{
    el.textContent += text[i];
    i++;
    if(i>=text.length) clearInterval(typeTimer);
  }, speed);
}

// ── SHOW BUBBLE ──
function showBubble(name){
  const key = FILE_KEYS[name];
  const p = pct(payments[name]);
  const phrase = getSiblingPhrase(name, p);
  document.getElementById('bubbleChar').src = key+'_frente.png';
  document.getElementById('bubbleName').textContent = name;
  typewrite(document.getElementById('bubbleText'), phrase);
  document.getElementById('bubbleOverlay').classList.add('active');
}
function closeBubble(e){
  if(e.target===document.getElementById('bubbleOverlay'))
    document.getElementById('bubbleOverlay').classList.remove('active');
}
function closeBubbleBtn(){
  document.getElementById('bubbleOverlay').classList.remove('active');
}

function showMamaBubble(){
  document.getElementById('mamaImg').src='mama_frente_v2.png';
  setTimeout(()=>document.getElementById('mamaImg').src='mama_frente.png',3000);
  typewrite(document.getElementById('mamaBubbleText'), getMamaPhrase(), 35);
  document.getElementById('mamaBubbleOverlay').classList.add('active');
}
function closeMamaBubble(e){
  if(e.target===document.getElementById('mamaBubbleOverlay'))
    document.getElementById('mamaBubbleOverlay').classList.remove('active');
}
function closeMamaBubbleBtn(){
  document.getElementById('mamaBubbleOverlay').classList.remove('active');
}

// ── RENDER ──
function renderPersons(){
  const sec=document.getElementById('personsSection');
  sec.innerHTML='';
  persons.forEach(name=>{
    const paid=payments[name];
    const p=pct(paid);
    const done=paid>=PER;
    const c=COLORS[name];
    const key=FILE_KEYS[name];
    const div=document.createElement('div');
    div.className='person-card';
    div.innerHTML=`
      <div class="person-row">
        <img src="${key}_corriendo.png" class="char-running" alt="${name}" onclick="showBubble('${name}')">
        <div class="person-info">
          <div>
            <span class="person-name" onclick="showBubble('${name}')">${name}</span>
            <span class="status-badge ${done?'badge-done':'badge-pending'}">${done?'✓ Listo':'Pendiente'}</span>
          </div>
          <div class="person-amounts">${fmt(paid)} pagado · ${fmt(Math.max(0,PER-paid))} restante</div>
        </div>
        <div class="person-pct" style="color:${c.bg}">${p.toFixed(1)}%</div>
      </div>
      <div class="mini-bar-track">
        <div class="mini-bar-fill" style="width:${p}%;background:${c.bar}"></div>
      </div>`;
    sec.appendChild(div);
  });
}

function renderOverall(){
  const totalPaid=persons.reduce((s,p)=>s+payments[p],0);
  const p=Math.min(100,(totalPaid/TOTAL)*100);
  document.getElementById('overallPct').textContent=p.toFixed(1)+'%';
  document.getElementById('overallBar').style.width=p+'%';
  document.getElementById('paidDisplay').textContent=fmt(totalPaid);
  document.getElementById('remainDisplay').textContent=fmt(Math.max(0,TOTAL-totalPaid));
  const diff=Math.ceil((DEADLINE-new Date())/86400000);
  document.getElementById('daysLeft').textContent=diff>0?diff+' días restantes':'⚠️ Plazo vencido';
}

function addHistoryItem(name,amt,dateStr){
  const hist=document.getElementById('history');
  const item=document.createElement('div');
  item.className='history-item';
  item.innerHTML='<span>'+dateStr+' · '+name+'</span><span>+'+fmt(amt)+'</span>';
  hist.prepend(item);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function registerPayment(){
  const name=document.getElementById('personSelect').value;
  const amt=parseFloat(document.getElementById('amountInput').value);
  if(!amt||amt<=0){showToast('Ingresa un monto válido');return;}
  payments[name]+=amt;
  document.getElementById('amountInput').value='';
  const now=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  addHistoryItem(name,amt,now);
  renderPersons();
  renderOverall();
  showToast('✓ '+fmt(amt)+' registrado para '+name);
}

// ── CONFETTI ──
const confCanvas = document.getElementById('confettiCanvas');
const confCtx = confCanvas.getContext('2d');
let confParticles = [];
let confAnim = null;

function launchConfetti(){
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confParticles = [];
  const colors = ['#e8c547','#ff6b6b','#6c63ff','#10b981','#ec4899','#3b82f6','#fff','#f59e0b'];
  for(let i=0;i<180;i++){
    confParticles.push({
      x: Math.random()*confCanvas.width,
      y: Math.random()*confCanvas.height - confCanvas.height,
      w: Math.random()*10+5,
      h: Math.random()*6+3,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*360,
      rotSpeed: (Math.random()-0.5)*6,
      vx: (Math.random()-0.5)*3,
      vy: Math.random()*4+3,
      opacity: 1
    });
  }
  if(confAnim) cancelAnimationFrame(confAnim);
  let frames = 0;
  function draw(){
    confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
    confParticles.forEach(p=>{
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      if(frames > 90) p.opacity -= 0.012;
      confCtx.save();
      confCtx.globalAlpha = Math.max(0, p.opacity);
      confCtx.translate(p.x, p.y);
      confCtx.rotate(p.rot*Math.PI/180);
      confCtx.fillStyle = p.color;
      confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      confCtx.restore();
    });
    frames++;
    confParticles = confParticles.filter(p=>p.opacity>0&&p.y<confCanvas.height+20);
    if(confParticles.length>0) confAnim = requestAnimationFrame(draw);
    else confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  }
  draw();
}

// Override showBubble to add confetti for Rosario at 100%
const _origShowBubble = showBubble;
window.showBubble = function(name){
  _origShowBubble(name);
  if(name === 'Rosario' && pct(payments['Rosario']) >= 100){
    launchConfetti();
    // burst again after bubble opens
    setTimeout(launchConfetti, 600);
  }
};

// Init
paymentHistory.forEach(h=>addHistoryItem(h.name,h.amount,h.date));
renderPersons();
renderOverall();
</script>
