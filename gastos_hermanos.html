<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>División de Gastos Familiares</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1928;
    --card: #211f35;
    --accent: #e8c547;
    --accent2: #ff6b6b;
    --text: #fffffe;
    --muted: #a7a9be;
    --total: 130546;
    --per-person: 26109.2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
    background-image: radial-gradient(ellipse at 20% 0%, #2a1f5e33 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 100%, #5e1f3e22 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  header h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    font-weight: 300;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    max-width: 700px;
    margin: 0 auto 2.5rem;
  }

  .summary-card {
    background: var(--card);
    border: 1px solid #ffffff10;
    border-radius: 14px;
    padding: 1.1rem 1.2rem;
    text-align: center;
  }

  .summary-card .label {
    color: var(--muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
  }

  .summary-card .value {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-top: 0.3rem;
    color: var(--accent);
  }

  /* ── OVERALL BAR ── */
  .overall-section {
    max-width: 700px;
    margin: 0 auto 2.5rem;
    background: var(--card);
    border: 1px solid #ffffff10;
    border-radius: 18px;
    padding: 1.5rem 1.8rem;
  }

  .overall-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1rem;
  }

  .overall-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
  }

  .overall-pct {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--accent);
  }

  .bar-track {
    background: #ffffff12;
    border-radius: 999px;
    height: 22px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #e8c547, #f0a500);
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 4px;
    background: #fff8;
    border-radius: 999px;
  }

  .deadline-note {
    margin-top: 0.8rem;
    color: var(--muted);
    font-size: 0.8rem;
    display: flex;
    justify-content: space-between;
  }

  /* ── PERSONS ── */
  .persons-section {
    max-width: 700px;
    margin: 0 auto 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .person-card {
    background: var(--card);
    border: 1px solid #ffffff0d;
    border-radius: 14px;
    padding: 1.1rem 1.3rem;
    transition: border-color .2s;
  }

  .person-card:hover { border-color: #e8c54740; }

  .person-row {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    margin-bottom: 0.75rem;
  }

  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .person-info { flex: 1; }
  .person-name { font-weight: 500; font-size: 1rem; }
  .person-amounts {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  .person-pct {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.2rem;
  }

  .mini-bar-track {
    background: #ffffff10;
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }

  /* ── INPUT FORM ── */
  .input-section {
    max-width: 700px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid #ffffff10;
    border-radius: 18px;
    padding: 1.5rem 1.8rem;
  }

  .input-section h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
    color: var(--text);
  }

  .form-row {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    flex: 1;
    min-width: 130px;
  }

  .form-group label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  select, input[type="number"] {
    background: #ffffff08;
    border: 1px solid #ffffff18;
    color: var(--text);
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }

  select:focus, input[type="number"]:focus {
    border-color: var(--accent);
  }

  select option { background: #211f35; }

  button {
    background: var(--accent);
    color: #0f0e17;
    border: none;
    border-radius: 10px;
    padding: 0.75rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.97); }

  .history {
    margin-top: 1.2rem;
    max-height: 180px;
    overflow-y: auto;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 0.45rem 0;
    border-bottom: 1px solid #ffffff08;
    font-size: 0.82rem;
    color: var(--muted);
    animation: fadeIn .3s ease;
  }

  .history-item span:last-child { color: var(--accent); font-weight: 500; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; } }

  .toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0f0e17;
    padding: 0.7rem 1.5rem;
    border-radius: 999px;
    font-weight: 500;
    font-size: 0.9rem;
    transition: transform .3s ease;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .status-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-done { background: #4caf5033; color: #81c784; }
  .badge-pending { background: #ff6b6b22; color: #ff8a80; }
</style>
</head>
<body>

<header>
  <h1>Gastos <span>Familiares</span></h1>
  <p class="subtitle">Total: $130,546 · 5 hermanos · Plazo: 1 Mayo 2027</p>
</header>

<!-- Summary cards -->
<div class="summary-grid">
  <div class="summary-card">
    <div class="label">Gasto Total</div>
    <div class="value" id="totalDisplay">$130,546</div>
  </div>
  <div class="summary-card">
    <div class="label">Por Persona</div>
    <div class="value">$26,109</div>
  </div>
  <div class="summary-card">
    <div class="label">Total Pagado</div>
    <div class="value" id="paidDisplay">$0</div>
  </div>
  <div class="summary-card">
    <div class="label">Pendiente</div>
    <div class="value" id="remainDisplay" style="color:#ff8a80">$130,546</div>
  </div>
</div>

<!-- Overall progress -->
<div class="overall-section">
  <div class="overall-header">
    <h2>Progreso General</h2>
    <div class="overall-pct" id="overallPct">0%</div>
  </div>
  <div class="bar-track">
    <div class="bar-fill" id="overallBar" style="width:0%"></div>
  </div>
  <div class="deadline-note">
    <span id="daysLeft">Calculando días...</span>
    <span>Meta: 1 Mayo 2027</span>
  </div>
</div>

<!-- Per-person bars -->
<div class="persons-section" id="personsSection"></div>

<!-- Input form -->
<div class="input-section">
  <h3>Registrar Pago</h3>
  <div class="form-row">
    <div class="form-group">
      <label>Hermano/a</label>
      <select id="personSelect">
        <option value="Negro">Negro</option>
        <option value="José">José</option>
        <option value="Rosario">Rosario</option>
        <option value="Marta">Marta</option>
        <option value="Juan">Juan</option>
      </select>
    </div>
    <div class="form-group">
      <label>Monto ($)</label>
      <input type="number" id="amountInput" placeholder="Ej: 5000" min="0">
    </div>
    <button onclick="registerPayment()">Agregar</button>
  </div>
  <div class="history" id="history"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOTAL = 130546;
const PER_PERSON = TOTAL / 5;
const DEADLINE = new Date('2027-05-01');

const COLORS = {
  'Negro':   { bg: '#6c63ff', bar: 'linear-gradient(90deg,#6c63ff,#a78bfa)' },
  'José':    { bg: '#f59e0b', bar: 'linear-gradient(90deg,#f59e0b,#fbbf24)' },
  'Rosario': { bg: '#ec4899', bar: 'linear-gradient(90deg,#ec4899,#f472b6)' },
  'Marta':   { bg: '#10b981', bar: 'linear-gradient(90deg,#10b981,#34d399)' },
  'Juan':    { bg: '#3b82f6', bar: 'linear-gradient(90deg,#3b82f6,#60a5fa)' },
};

const persons = ['Negro','José','Rosario','Marta','Juan'];
let payments = {};
persons.forEach(p => payments[p] = 0);
payments['Juan'] = 130;
payments['Marta'] = 2100;

const paymentHistory = [
  { name: 'Marta', amount: 2100, date: '05 jun 2026' },
  { name: 'Juan', amount: 130, date: '20 may 2026' }
];

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-MX');
}

function pct(paid) {
  return Math.min(100, (paid / PER_PERSON) * 100);
}

function renderPersons() {
  const sec = document.getElementById('personsSection');
  sec.innerHTML = '';
  persons.forEach(name => {
    const paid = payments[name];
    const p = pct(paid);
    const done = paid >= PER_PERSON;
    const c = COLORS[name];

    sec.innerHTML += `
      <div class="person-card">
        <div class="person-row">
          <div class="avatar" style="background:${c.bg}22;color:${c.bg}">${name[0]}</div>
          <div class="person-info">
            <div class="person-name">${name}
              <span class="status-badge ${done ? 'badge-done' : 'badge-pending'}">${done ? '✓ Listo' : 'Pendiente'}</span>
            </div>
            <div class="person-amounts">${fmt(paid)} pagado · ${fmt(Math.max(0,PER_PERSON-paid))} restante</div>
          </div>
          <div class="person-pct" style="color:${c.bg}">${p.toFixed(1)}%</div>
        </div>
        <div class="mini-bar-track">
          <div class="mini-bar-fill" style="width:${p}%;background:${c.bar}"></div>
        </div>
      </div>
    `;
  });
}

function renderOverall() {
  const totalPaid = persons.reduce((s,p) => s + payments[p], 0);
  const p = Math.min(100, (totalPaid / TOTAL) * 100);

  document.getElementById('overallPct').textContent = p.toFixed(1) + '%';
  document.getElementById('overallBar').style.width = p + '%';
  document.getElementById('paidDisplay').textContent = fmt(totalPaid);
  document.getElementById('remainDisplay').textContent = fmt(Math.max(0, TOTAL - totalPaid));

  const now = new Date();
  const diff = Math.ceil((DEADLINE - now) / 86400000);
  document.getElementById('daysLeft').textContent =
    diff > 0 ? `${diff} días restantes` : '⚠️ Plazo vencido';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function addHistoryItem(name, amt, dateStr) {
  const hist = document.getElementById('history');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = '<span>' + dateStr + ' · ' + name + '</span><span>+' + fmt(amt) + '</span>';
  hist.prepend(item);
}

function registerPayment() {
  const name = document.getElementById('personSelect').value;
  const amt = parseFloat(document.getElementById('amountInput').value);
  if (!amt || amt <= 0) { showToast('Ingresa un monto válido'); return; }

  payments[name] += amt;
  document.getElementById('amountInput').value = '';

  const now = new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  addHistoryItem(name, amt, now);

  renderPersons();
  renderOverall();
  showToast('✓ ' + fmt(amt) + ' registrado para ' + name);
}

// Init — render pre-loaded history
paymentHistory.forEach(function(h){ addHistoryItem(h.name, h.amount, h.date); });
renderPersons();
renderOverall();
</script>
</body>
</html>
